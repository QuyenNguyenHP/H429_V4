<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRUMS - DG Load Trend</title>
    <link rel="icon" type="image/png" href="./Asset/DRUMS_logo_small.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="./app.css">
    <style>
        :root {
            --trend-shell: rgba(235, 237, 240, 0.95);
            --trend-panel: #f8fafc;
            --trend-panel-border: #94a3b8;
        }
        .trend-shell { max-width: 1500px; margin: 0 auto; background: var(--trend-shell); border: 2px solid #4b5563; box-shadow: 0 15px 30px rgba(0,0,0,.15); padding: 16px; }
        .trend-panel { background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%); border: 1px solid var(--trend-panel-border); border-radius: 24px; padding: 20px; box-shadow: inset 0 1px 0 rgba(255,255,255,.65); }
        .trend-input { background: #fff; color: #0f172a; border: 1px solid #94a3b8; border-radius: 14px; padding: 10px 14px; min-height: 48px; font-size: 1rem; font-weight: 700; }
        .trend-btn { min-height: 46px; border-radius: 8px; border: 1px solid #64748b; background: #fff; color: #0f172a; box-shadow: 1px 1px 0 #475569; padding: 0 18px; font-size: .98rem; font-weight: 800; transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease; }
        .trend-btn:hover { border-color: #2563eb; box-shadow: 0 4px 12px rgba(37,99,235,.15); transform: translateY(-1px); }
        .trend-header-box { background-color: #fff; border: 1px solid #64748b; padding: 6px 12px; box-shadow: 1px 1px 0 #475569; }
        .trend-hero-title { color: #1d4ed8; font-weight: 800; font-size: 2rem; letter-spacing: .01em; line-height: 1; margin: 0; }
        .trend-breadcrumb { color: #64748b; font-size: .85rem; font-weight: 700; margin-top: 8px; }
        .trend-check { display: inline-flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #94a3b8; border-radius: 999px; padding: 8px 12px; color: #0f172a; font-weight: 700; }
        .trend-chart-wrap { margin-top: 16px; background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%); border: 1px solid #94a3b8; border-radius: 22px; padding: 18px; }
        .trend-chart-canvas { width: 100%; height: 380px; }
        .trend-status { color: #475569; font-size: .95rem; font-weight: 700; min-height: 24px; }
        .trend-status.error { color: #fca5a5; }
        .series-dot { width: 12px; height: 12px; border-radius: 999px; display: inline-block; }
    </style>
</head>
<body class="p-4">
    <div class="trend-shell">
        <div class="flex justify-between items-start mb-6 gap-4">
            <div class="flex items-center gap-4">
                <div class="header-clickable">
                    <img id="go-home-logo" src="./Asset/DRUMS_LOGO.png" alt="DRUMS logo" class="h-14 w-auto cursor-pointer">
                </div>
                <div>
                    <h1 class="trend-hero-title">LOAD GRAPH</h1>
                    <div class="trend-breadcrumb">HOME / DG DASHBOARD / LOAD GRAPH</div>
                </div>
            </div>
            <div class="trend-header-box min-w-[220px] h-10 flex items-center px-3 py-1">
                <div class="w-full">
                    <div class="text-[10px] font-extrabold border-b border-gray-100 mb-0.5 text-center text-gray-600 leading-none">DATE & TIME</div>
                    <div class="text-base font-bold text-center tracking-tight leading-none" id="current-datetime">--/--/-- &nbsp;&nbsp; --:--:--</div>
                </div>
            </div>
        </div>

        <div class="trend-panel">
            <div class="flex flex-wrap items-end gap-4">
                <div class="flex flex-col gap-2">
                    <label for="from-utc" class="text-sm font-bold text-slate-700">From</label>
                    <input id="from-utc" class="trend-input" type="datetime-local">
                </div>
                <div class="flex flex-col gap-2">
                    <label for="to-utc" class="text-sm font-bold text-slate-700">To</label>
                    <input id="to-utc" class="trend-input" type="datetime-local">
                </div>
                <div class="flex flex-col gap-2">
                    <span class="text-sm font-bold text-slate-700">DG Selection</span>
                    <div class="flex flex-wrap gap-2">
                        <label class="trend-check"><span class="series-dot" style="background:#1d4ed8"></span><input type="checkbox" name="dg-name" value="DG#1" checked> DG#1</label>
                        <label class="trend-check"><span class="series-dot" style="background:#16a34a"></span><input type="checkbox" name="dg-name" value="DG#2" checked> DG#2</label>
                        <label class="trend-check"><span class="series-dot" style="background:#b91c1c"></span><input type="checkbox" name="dg-name" value="DG#3" checked> DG#3</label>
                    </div>
                </div>
                <button id="prev-24h-btn" class="trend-btn" type="button">Prev 24h</button>
                <button id="next-24h-btn" class="trend-btn" type="button">Next 24h</button>
                <button id="apply-btn" class="trend-btn" type="button">Apply</button>
            </div>

            <div id="trend-status" class="trend-status mt-4"></div>
            <div class="trend-chart-wrap">
                <canvas id="load-trend-chart" class="trend-chart-canvas"></canvas>
            </div>
        </div>
    </div>

    <script src="./dashboard_shared.js"></script>
    <script src="./Load_graph.js"></script>
</body>
</html>
