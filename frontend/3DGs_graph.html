<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>DRUMS - DG Load Trend</title>
    <link rel="icon" type="image/png" href="./Asset/DRUMS_logo_small.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="./app.css">
    <link rel="stylesheet" href="./trend_controls_standard.css">
    <style>
        :root {
            --trend-panel: var(--surface-1);
            --trend-panel-border: #94a3b8;
        }
        .trend-panel { background: linear-gradient(180deg, var(--surface-1) 0%, var(--surface-2) 100%); border: 1px solid var(--trend-panel-border); border-radius: 24px; padding: 20px; box-shadow: inset 0 1px 0 rgba(255,255,255,.65); }
        .trend-hero-title { color: var(--title-accent); font-weight: 800; font-size: 2rem; letter-spacing: .01em; line-height: 1; margin: 0; }
        .trend-breadcrumb { color: var(--text-soft); font-size: .85rem; font-weight: 700; margin-top: 8px; }
        .trend-check-group { display: flex; flex-direction: column; gap: 10px; padding: 12px 14px; background: linear-gradient(180deg, var(--surface-strong) 0%, var(--surface-1) 100%); border: 1px solid #94a3b8; border-radius: 18px; box-shadow: inset 0 1px 0 rgba(255,255,255,.65); }
        .trend-check-row { display: flex; flex-wrap: wrap; gap: 10px; }
        .trend-check { position: relative; display: inline-flex; align-items: center; gap: 10px; background: var(--surface-strong); border: 1px solid #94a3b8; border-radius: 999px; padding: 10px 16px; color: var(--text-main); font-weight: 800; cursor: pointer; transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease; }
        .trend-check:hover { border-color: #2563eb; box-shadow: 0 4px 12px rgba(37,99,235,.12); transform: translateY(-1px); }
        .trend-check input { position: absolute; opacity: 0; pointer-events: none; }
        .trend-check-box { width: 16px; height: 16px; border: 1.5px solid #64748b; border-radius: 4px; background: var(--surface-strong); display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; transition: all .18s ease; }
        .trend-check-box::after { content: ""; width: 7px; height: 4px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translateY(-1px); opacity: 0; transition: opacity .18s ease; }
        .trend-check-label { line-height: 1; }
        .trend-check input:checked + .trend-check-box::after { opacity: 1; }
        .trend-check-dg1 input:checked + .trend-check-box { background: #1d4ed8; border-color: #1d4ed8; }
        .trend-check-dg2 input:checked + .trend-check-box { background: #16a34a; border-color: #16a34a; }
        .trend-check-dg3 input:checked + .trend-check-box { background: #b91c1c; border-color: #b91c1c; }
        .trend-chart-wrap { margin-top: 16px; background: linear-gradient(180deg, var(--surface-strong) 0%, var(--surface-1) 100%); border: 1px solid #94a3b8; border-radius: 22px; padding: 18px; }
        .trend-chart-toolbar { position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; z-index: 5; }
        .trend-icon-btn { width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid #94a3b8; border-radius: 10px; background: var(--surface-strong); color: var(--title-accent); box-shadow: 0 8px 16px rgba(15, 23, 42, 0.10); transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease; }
        .trend-icon-btn:hover { border-color: #2563eb; transform: translateY(-1px); box-shadow: 0 10px 20px rgba(37,99,235,.15); }
        .trend-icon-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .trend-chart-box { position: relative; width: 100%; height: 380px; }
        .trend-chart-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; align-items: stretch; }
        .trend-subpanel { background: linear-gradient(180deg, var(--surface-strong) 0%, var(--surface-1) 100%); border: 1px solid #cbd5e1; border-radius: 18px; padding: 16px; min-width: 0; }
        .trend-chart-box-sm { position: relative; width: 100%; height: 300px; }
        .trend-section-note { color: var(--text-muted); font-size: .82rem; font-weight: 700; margin-top: -4px; margin-bottom: 10px; }
        @media (max-width: 900px) {
            .trend-chart-grid { grid-template-columns: 1fr; }
        }
        .trend-chart-canvas,
        .trend-chart-canvas-sm { display: block; width: 100% !important; height: 100% !important; }
        .trend-chart-title { color: var(--text-main); font-size: 1rem; font-weight: 800; margin: 0 0 12px; }
        .trend-status { color: var(--text-muted); font-size: .95rem; font-weight: 700; min-height: 24px; }
        .trend-status.error { color: #fca5a5; }
        .trend-control-cluster { display: flex; flex-direction: column; gap: 12px; margin-left: auto; align-items: flex-end; }
        .trend-action-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; justify-content: flex-end; }
        .trend-mode-switch { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: flex-end; }
        .trend-mode-btn {
            min-width: 0;
            min-height: 0;
            border: 1px solid #94a3b8;
            border-radius: 16px;
            background: linear-gradient(180deg, var(--surface-strong) 0%, var(--surface-1) 100%);
            color: #1d4ed8;
            padding: 10px 18px;
            font-weight: 800;
            font-size: 0.95rem;
            box-shadow: 0 3px 0 #64748b;
            transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease, background-color .18s ease, color .18s ease;
        }
        .trend-mode-btn:hover {
            border-color: #2563eb;
            box-shadow: 0 5px 14px rgba(37,99,235,.16);
            transform: translateY(-1px);
        }
        .trend-mode-btn.is-active {
            background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
            border-color: #1d4ed8;
            color: #fff;
            box-shadow: 0 3px 0 #1e3a8a;
        }
        .series-dot { width: 12px; height: 12px; border-radius: 999px; display: inline-block; }
        .pms-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
        .pms-top-row { display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin-bottom: 6px; min-height: 30px; }
        .pms-metrics { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }
        .pms-metric-card { background: var(--surface-strong); border: 1px solid #cbd5e1; border-radius: 8px; padding: 4px 8px; min-width: 86px; }
        .pms-metric-label { color: var(--text-soft); font-size: .62rem; font-weight: 800; line-height: 1; text-transform: uppercase; }
        .pms-metric-value { color: var(--text-main); font-size: .82rem; font-weight: 800; line-height: 1.1; }
        .trend-section-stack { display: flex; flex-direction: column; gap: 18px; }
        @media (max-width: 900px) {
            .pms-header-row { flex-direction: column; }
            .pms-top-row { justify-content: flex-start; }
            .pms-metrics { flex-wrap: wrap; }
            .trend-control-cluster { margin-left: 0; align-items: stretch; width: 100%; }
            .trend-action-row,
            .trend-mode-switch { justify-content: flex-start; }
        }
    </style>
</head>
<body class="dg-page graph-page">
    <div class="main-container">
        <!-- Top header: logo/title on the left, live clock on the right -->
        <div class="dashboard-header">
            <div class="dashboard-header-main">
                <div class="header-clickable">
                    <img id="go-home-logo" src="./Asset/DRUMS_LOGO.png" alt="DRUMS logo" class="h-14 w-auto cursor-pointer">
                </div>
                <div class="dashboard-header-title">
                    <h1 class="text-4xl font-extrabold tracking-tight text-blue-700 leading-none">LOAD GRAPH</h1>
                </div>
            </div>
            <div id="graph-shared-trend-controls" class="header-box flex flex-wrap items-end gap-3 px-4 py-3">
                <div class="trend-time-field">
                    <label for="from-utc" class="text-sm font-bold text-slate-700">From</label>
                    <input id="from-utc" class="trend-input" type="datetime-local" lang="en-GB" step="60">
                </div>
                <div class="trend-time-field">
                    <label for="to-utc" class="text-sm font-bold text-slate-700">To</label>
                    <input id="to-utc" class="trend-input" type="datetime-local" lang="en-GB" step="60">
                </div>
                <button id="prev-24h-btn" class="trend-btn" type="button">Prev 24h</button>
                <button id="next-24h-btn" class="trend-btn" type="button">Next 24h</button>
                <button id="apply-btn" class="trend-btn" type="button">Apply</button>
            </div>
            <div class="header-box dashboard-time-box">
                <div class="w-full">
                    <div class="text-[10px] font-extrabold border-b border-gray-100 mb-0.5 text-center text-gray-600 leading-none">DATE & TIME</div>
                    <div class="text-base font-bold text-center tracking-tight leading-none" id="current-datetime">--/--/-- &nbsp;&nbsp; --:--:--</div>
                </div>
            </div>
        </div>

        <div id="graph-scene-stage" class="trend-section-stack">
        <div class="trend-panel trend-panel-main">
            <!-- Filter/action row: time range, DG selection, and reload controls -->
            <div class="flex flex-wrap items-end gap-4">
                <div class="trend-check-group">
                    <span class="text-sm font-bold text-slate-700">DG Selection</span>
                    <div class="trend-check-row">
                        <label class="trend-check trend-check-dg1"><input type="checkbox" name="dg-name" value="DG#1" checked><span class="trend-check-box"></span><span class="trend-check-label">DG#1</span></label>
                        <label class="trend-check trend-check-dg2"><input type="checkbox" name="dg-name" value="DG#2" checked><span class="trend-check-box"></span><span class="trend-check-label">DG#2</span></label>
                        <label class="trend-check trend-check-dg3"><input type="checkbox" name="dg-name" value="DG#3" checked><span class="trend-check-box"></span><span class="trend-check-label">DG#3</span></label>
                    </div>
                </div>
            </div>

            <!-- Main load trend chart: clicking a point syncs the PMS panel -->
            <div id="trend-status" class="trend-status mt-4"></div>
            <div class="trend-chart-wrap relative">
                <div id="trend-loading" class="embedded-trend-loading" aria-hidden="true">
                    <div class="embedded-trend-spinner"></div>
                </div>
                <div class="trend-chart-toolbar">
                    <button id="zoom-in-btn" class="trend-icon-btn" type="button" aria-label="Zoom in">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="11" cy="11" r="6"></circle>
                            <line x1="16" y1="16" x2="21" y2="21"></line>
                            <line x1="11" y1="8.5" x2="11" y2="13.5"></line>
                            <line x1="8.5" y1="11" x2="13.5" y2="11"></line>
                        </svg>
                    </button>
                    <button id="zoom-out-btn" class="trend-icon-btn" type="button" aria-label="Zoom out">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="11" cy="11" r="6"></circle>
                            <line x1="16" y1="16" x2="21" y2="21"></line>
                            <line x1="8.5" y1="11" x2="13.5" y2="11"></line>
                        </svg>
                    </button>
                </div>
                <h2 id="main-chart-title" class="trend-chart-title">Load Trend</h2>
                <div class="trend-chart-box">
                    <canvas id="load-trend-chart" class="trend-chart-canvas"></canvas>
                </div>
            </div>
        </div>

        <div class="trend-panel trend-panel-bottom">
            <!-- Bottom row: DG running hours and PMS live in a separate section -->
            <div class="trend-chart-grid">
                <!-- Running hours summary chart -->
                <div class="trend-subpanel">
                    <h2 class="trend-chart-title">DGs Running Hours</h2>
                    <div class="trend-section-note">Snapshot from latest machine status data.</div>
                    <div class="trend-chart-box-sm">
                        <canvas id="running-hours-chart" class="trend-chart-canvas-sm"></canvas>
                    </div>
                </div>

                <!-- PMS panel: snapshot text, compact voltage/frequency cards, and grouped bar chart -->
                <div class="trend-subpanel">
                    <div class="pms-header-row">
                        <div>
                            <h2 class="trend-chart-title">PMS</h2>
                            <div id="pms-status" class="trend-section-note">Select a point on the Load Trend to sync PMS values.</div>
                        </div>
                        <!-- Small PMS summary cards shown above the chart -->
                        <div class="pms-top-row">
                            <div class="pms-metrics">
                                <div class="pms-metric-card">
                                    <div class="pms-metric-label">Voltage</div>
                                    <div id="pms-voltage-value" class="pms-metric-value">--</div>
                                </div>
                                <div class="pms-metric-card">
                                    <div class="pms-metric-label">Frequency</div>
                                    <div id="pms-frequency-value" class="pms-metric-value">--</div>
                                </div>
                            </div>
                        </div>
                    </div> 

                    <!-- PMS bar chart with its own loading overlay -->
                    <div class="trend-chart-box-sm">
                        <div id="pms-loading" class="embedded-trend-loading" aria-hidden="true">
                            <div class="embedded-trend-spinner"></div>
                        </div>
                        <canvas id="pms-chart" class="trend-chart-canvas-sm"></canvas>
                    </div>
                </div>
            </div>
        </div>
        </div>

    </div>

    <script src="./dashboard_shared.js"></script>
    <script src="./dg_load_trend.js"></script>
</body>
</html>
