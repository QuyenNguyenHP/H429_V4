<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>DRUMS HOME </title>
    <link rel="icon" type="image/png" href="./Asset/DRUMS_logo_small.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./app.css">
</head>
<body class="index-page">
    <div class="main-container">
            <!-- Header Section -->
            <div id="header-stage" class="relative flex justify-between items-start mb-4">
                <!-- Vessel Tag -->
                <div id="vessel-box" class="header-box px-5 py-2 text-center">
                    <span class="dg-title vessel-title !mb-0 !pb-0 !border-b-0">VESSEL : H429</span>
                </div>

                <!-- DRUMS Logo Center -->
                <div id="logo-box" class="header-clickable absolute left-0 top-0 flex items-center justify-center">
                    <img src="./Asset/DRUMS_LOGO.png" alt="DRUMS logo" class="h-14 w-auto object-contain">
                </div>

                <!-- Icons bên phải -->
                <div id="header-right" class="flex items-start gap-3">
                    <div id="date-time-box" class="header-box min-w-[220px] h-10 flex items-center px-3 py-1">
                        <div class="w-full">
                            <div class="text-[10px] font-extrabold border-b border-gray-100 mb-0.5 text-center text-gray-600 leading-none">DATE & TIME</div>
                            <div class="text-base font-bold text-center tracking-tight leading-none" id="clock">--/--/-- &nbsp;&nbsp; --:--:--</div>
                        </div>
                    </div>
                    <div id="header-icons" class="flex gap-2">
                        <button title="User Profile" class="header-clickable w-10 h-10 bg-blue-600 rounded flex items-center justify-center text-white hover:bg-blue-700 transition-colors shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        </button>
                        <button title="System Info" class="header-clickable w-10 h-10 bg-white border-2 border-blue-800 rounded-full flex items-center justify-center text-blue-800 font-black hover:bg-blue-50 transition-colors shadow-sm">i</button>
                    </div>
                </div>
            </div>

            <!-- Machine cards are rendered from INDEX_DG_CONFIG in index.js. -->
            <div id="dg-cards-stage" class="dg-cards-stage">
                <section id="me-section" class="dashboard-group-card scene-section"></section>
                <section id="dg-section" class="dashboard-group-card scene-section"></section>
            </div>

            <!-- Thanh trạng thái phía dưới (Status Bar) -->
            <div id="system-status-bar" class="mt-auto border border-gray-400 bg-gray-200 p-2 text-[10px] font-bold flex justify-between text-gray-700 shadow-inner">
                <div class="flex gap-6">
                    <span>SYSTEM STATUS: <span class="text-green-700">NORMAL</span></span>
                    <span>COMMUNICATION: <span class="text-blue-700">TCP/IP CONNECTED</span></span>
                </div>
                <div class="italic">DRUMS v2.5.0</div>
            </div>
    </div>

    <script src="./dashboard_shared.js"></script>
    <script src="./index.js"></script>
</body>
</html>
