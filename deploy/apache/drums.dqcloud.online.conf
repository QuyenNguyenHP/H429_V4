<VirtualHost *:80>
    ServerName drums.dqcloud.online
    ServerAlias www.drums.dqcloud.online

    DocumentRoot /home/nguyen/H429_v3/frontend

    <Directory /home/nguyen/H429_v3/frontend>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    DirectoryIndex index.html

    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:8888/api/
    ProxyPassReverse /api/ http://127.0.0.1:8888/api/

    ErrorLog ${APACHE_LOG_DIR}/drums.dqcloud.online_error.log
    CustomLog ${APACHE_LOG_DIR}/drums.dqcloud.online_access.log combined
</VirtualHost>
